<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Formulario de Contacto - Gestor de Contactos</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="bg-light">

  <nav class="navbar navbar-expand-lg bg-white border-bottom px-3 py-2">
    <div class="container-fluid">
      <a href="index.html" class="navbar-brand fw-bold">← Gestor de Contactos</a>
    </div>
  </nav>

  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <div class="card shadow-sm">
          <div class="card-header bg-white">
            <h4 id="form-title" class="mb-0">Nuevo Contacto</h4>
          </div>

          <div class="card-body p-4">
            <form id="contact-form" novalidate>
              <div class="row g-3">
                <div class="col-12">
                  <label for="name" class="form-label">Nombre completo</label>
                  <input
                    type="text"
                    id="name"
                    class="form-control"
                    maxlength="60"
                    required
                  />
                  <div class="form-text">Mínimo 2, máximo 60 caracteres.</div>
                </div>

                <div class="col-md-6">
                  <label for="phone" class="form-label">Teléfono</label>
                  <input
                    type="tel"
                    id="phone"
                    class="form-control"
                    maxlength="15"
                    required
                  />
                  <div class="form-text">Solo números, entre 8 y 15 dígitos.</div>
                </div>

                <div class="col-md-6">
                  <label for="email" class="form-label">Correo electrónico</label>
                  <input
                    type="email"
                    id="email"
                    class="form-control"
                    maxlength="100"
                    required
                  />
                  <div class="form-text">Formato válido. Máximo 100 caracteres.</div>
                </div>

                <div class="col-12">
                  <label for="img_link" class="form-label">Link de imagen (opcional)</label>
                  <input
                    type="url"
                    id="img_link"
                    class="form-control"
                    maxlength="10000"
                    placeholder="https://..."
                  />
                  <div class="form-text">Debe ser una URL válida (http o https).</div>
                </div>

                <div class="col-12">
                  <img
                    id="img-preview"
                    alt="Vista previa de la imagen del contacto"
                    class="rounded border"
                    style="display:none; width:120px; height:120px; object-fit:cover;"
                  />
                </div>
              </div>

              <!-- Mensajes de error/éxito desde form.js -->
              <div id="form-alert" class="mt-3"></div>

              <div class="d-flex justify-content-end gap-2 mt-4">
                <a href="index.html" class="btn btn-secondary">Cancelar</a>
                <button type="submit" id="submit-btn" class="btn btn-primary">
                  Guardar Contacto
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Script externo del formulario -->
  <script src="form.js"></script>
</body>
</html>
