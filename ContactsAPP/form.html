<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Contacto - Gestor de Contactos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg bg-white border-bottom px-3 py-2">
        <div class="container-fluid">
            <a href="index.html" class="navbar-brand fw-bold">← Gestor de Contactos</a>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow-sm">
                    <div class="card-header bg-white">
                        <h4 id="form-title" class="mb-0">Nuevo Contacto</h4>
                    </div>
                    <div class="card-body p-4">
                        <form id="contact-form" onsubmit="handleSubmit(event)">
                            <div class="row g-3">
                                <div class="col-12">
                                    <label class="form-label">Nombre completo</label>
                                    <input type="text" id="name" class="form-control" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Teléfono</label>
                                    <input type="tel" id="phone" class="form-control" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Correo electrónico</label>
                                    <input type="email" id="email" class="form-control" required>
                                </div>
                                <div class="col-12">
                                    <label class="form-label">URL de foto (opcional)</label>
                                    <input type="url" id="photo" class="form-control" placeholder="https://...">
                                </div>
                                <div class="col-12">
                                    <div class="form-check">
                                        <input type="checkbox" id="favorite" class="form-check-input">
                                        <label class="form-check-label" for="favorite">Marcar como favorito</label>
                                    </div>
                                </div>
                            </div>

                            <div class="d-flex justify-content-end gap-2 mt-4">
                                <a href="index.html" class="btn btn-secondary">Cancelar</a>
                                <button type="submit" id="submit-btn" class="btn btn-primary">Guardar Contacto</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let contacts = JSON.parse(localStorage.getItem('contacts')) || [];

        function getUrlParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        function loadEditData() {
            const id = getUrlParam('id');
            if (!id) return;

            const contact = contacts.find(c => c.id == id);
            if (!contact) return;

            document.getElementById('form-title').textContent = 'Editar Contacto';
            document.getElementById('submit-btn').textContent = 'Actualizar Contacto';

            document.getElementById('name').value = contact.name;
            document.getElementById('phone').value = contact.phone;
            document.getElementById('email').value = contact.email;
            document.getElementById('photo').value = contact.photo || '';
            document.getElementById('favorite').checked = contact.favorite;
        }

        function handleSubmit(e) {
            e.preventDefault();

            const id = getUrlParam('id');
            const name = document.getElementById('name').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const email = document.getElementById('email').value.trim();
            const photo = document.getElementById('photo').value.trim() || '';
            const favorite = document.getElementById('favorite').checked;

            if (id) {
                const contact = contacts.find(c => c.id == id);
                if (contact) {
                    contact.name = name;
                    contact.phone = phone;
                    contact.email = email;
                    contact.photo = photo;
                    contact.favorite = favorite;
                }
            } else {
                const newContact = {
                    id: Date.now(),
                    name: name,
                    phone: phone,
                    email: email,
                    photo: photo,
                    favorite: favorite,
                    tags: []
                };
                contacts.push(newContact);
            }

            localStorage.setItem('contacts', JSON.stringify(contacts));
            alert(id ? '¡Contacto actualizado!' : '¡Contacto creado!');
            window.location.href = 'index.html';
        }

        window.onload = loadEditData;
    </script>
</body>
</html>
