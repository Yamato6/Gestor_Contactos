<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestor de Contactos</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- NAVBAR SUPERIOR -->
  <nav class="navbar navbar-expand-lg bg-white border-bottom px-3 py-2">
    <div class="container-fluid">
      <div class="d-flex align-items-center gap-2">
        <div
          class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center"
          style="width: 38px; height: 38px;"
        >
          <span class="fw-bold fs-4">+</span>
        </div>
        <span class="fw-bold fs-4 text-dark">Gestor de Contactos</span>
      </div>

      <div class="d-flex align-items-center gap-3">
        <div class="input-group" style="width: 320px;">
          <span class="input-group-text border-0 bg-light">🔎</span>
          <input
            type="text"
            id="search-input"
            class="form-control border-0 bg-light"
            placeholder="Buscar contactos"
          />
        </div>

        <button id="btn-new-contact" class="btn btn-primary d-flex align-items-center gap-1">
          <span class="fw-bold">+</span> Nuevo
        </button>
      </div>
    </div>
  </nav>

  <div class="container-fluid h-100">
    <div class="row h-100">
      <!-- PANEL IZQUIERDO: LISTA -->
      <div class="col-lg-5 col-xl-4 border-end bg-light overflow-auto" style="height: calc(100vh - 65px);">
        <div class="p-3">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="mb-0 fw-semibold">
              Contactos <span id="contact-count" class="text-muted">(0)</span>
            </h5>
            <button id="btn-sort-az" class="btn btn-sm btn-outline-secondary">Ordenar A-Z</button>
          </div>

          <div id="contacts-list" class="list-group list-group-flush">
            <!-- Generado por contactAPP.js -->
          </div>
        </div>
      </div>

      <!-- PANEL DERECHO: DETALLE -->
      <div class="col-lg-7 col-xl-8 p-4 overflow-auto" id="detail-panel" style="height: calc(100vh - 65px);">
        <div id="no-selection" class="text-center text-muted py-5">
          <div
            class="mx-auto mb-4"
            style="
              width: 120px;
              height: 120px;
              background: #f1f3f5;
              border-radius: 50%;
              display: flex;
              align-items: center;
              justify-content: center;
              font-size: 48px;
            "
          >
            👤
          </div>
          <h4>Selecciona un contacto</h4>
          <p class="mb-0">La información aparecerá aquí</p>
        </div>

        <div id="contact-detail" class="d-none">
          <div class="d-flex align-items-start gap-4">
            <div
              class="rounded-circle bg-secondary text-white d-flex align-items-center justify-content-center fw-bold"
              id="detail-avatar"
              style="width: 120px; height: 120px; font-size: 2rem;"
            >
              --
            </div>

            <div class="flex-grow-1">
              <div class="d-flex justify-content-between align-items-center">
                <h2 id="detail-name" class="mb-0 fw-bold"></h2>
                <div>
                  <button id="btn-edit-contact" class="btn btn-light border-0 ms-2">✏️</button>
                  <button id="btn-delete-contact" class="btn btn-light border-0 text-danger ms-2">🗑️</button>
                </div>
              </div>

              <div class="mt-4">
                <div class="d-flex align-items-center gap-3 mb-3">
                  <span class="text-primary">📱</span>
                  <div>
                    <small class="text-uppercase text-muted">Teléfono</small>
                    <p id="detail-phone" class="mb-0 fw-medium"></p>
                  </div>
                </div>

                <div class="d-flex align-items-center gap-3 mb-3">
                  <span class="text-primary">✉️</span>
                  <div>
                    <small class="text-uppercase text-muted">Correo electrónico</small>
                    <p id="detail-email" class="mb-0 fw-medium"></p>
                  </div>
                </div>
              </div>

              <div id="detail-id" class="mt-4 text-muted small"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Script externo del proyecto -->
  <script src="contactAPP.js"></script>
</body>
</html>
